<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 id="title">counterapp</h1>

    <h2 id="number">0</h2>

    <h3 id="name">kadhir</h3>

    

    

    
    <button onclick="plus()">+</button>

    
    <button onclick="minus()">-</button>

    <script>
        let counter=0;

        function plus(){
            
            
            counter=counter+1
            document.getElementById("number").innerText= counter;     
            
        }

        

        function minus(){
            counter= counter-1
            document.getElementById("number").innerText=counter;

        }



    </script>

</body>
</html>
